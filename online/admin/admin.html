<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | TileBattle</title>
    <link rel="stylesheet" href="/admin-style.css">
</head>
<body>
    <div class="admin-container">
        <div class="header-flex">
            <div>
                <h1 style="color: #ff4d4d; margin: 0;">ADMIN PANEL</h1>
                <p id="admin-status" style="color: #818384;"></p>
            </div>
            <button onclick="logout()" class="btn-delete" style="background: #333;">LOGOUT</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Wins</th>
                    <th>Rank Points</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="user-table-body">
                <!-- Users injected by admin.js -->
            </tbody>
        </table>
    </div>

    <script src="/admin.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('tb_admin_token');
            window.location.href = '/admin/login';
        }
    </script>
</body>
</html>
